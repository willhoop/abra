<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABRA WORLD — the Champions modeling town</title>
<style>
/* ============ ABRA WORLD — Club-Penguin-meets-Pokemon ============ */
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@500;600;700&display=swap');
:root{
  --sky1:#8fd3ff; --sky2:#c9efff; --snow:#f4fbff; --ink:#20344a;
  --line:#20344a;
  --electric:#ffd23f; --electric2:#ffb300;
  --fight:#ff6b57; --psy:#ff6bd6; --water:#4fb0ff; --grass:#5fd07a; --dragon:#7a6bff;
  --card:#ffffff; --shadow:rgba(32,52,74,.28);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:'Fredoka',system-ui,sans-serif;color:var(--ink);overflow-x:hidden}
body{background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 42%,var(--snow) 42%,var(--snow) 100%);min-height:100vh}
h1,h2,h3,.baloo{font-family:'Baloo 2',cursive}
button{font-family:'Baloo 2',cursive;cursor:pointer}

/* ---- sky layer ---- */
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.cloud{position:absolute;background:#fff;border-radius:50%;filter:blur(.3px);opacity:.9;
  box-shadow:40px 8px 0 6px #fff,90px 0 0 0px #fff,-38px 10px 0 0 #fff;animation:drift linear infinite}
@keyframes drift{from{transform:translateX(-20vw)}to{transform:translateX(120vw)}}
.snowf{position:absolute;top:-10px;color:#fff;opacity:.9;animation:fall linear infinite;text-shadow:0 1px 2px rgba(0,0,0,.05)}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg)}}
.mountain{position:fixed;bottom:calc(58vh - 2px);left:0;right:0;height:120px;z-index:0;pointer-events:none}

/* ---- header / tabs ---- */
header{position:relative;z-index:5;text-align:center;padding:18px 12px 6px}
.logo{display:inline-flex;align-items:center;gap:14px}
.logo h1{margin:0;font-size:clamp(34px,7vw,68px);color:#fff;letter-spacing:1px;
  text-shadow:0 4px 0 var(--electric2),0 6px 0 var(--line),0 10px 18px var(--shadow);animation:bob 3s ease-in-out infinite}
.logo img{width:74px;height:74px;image-rendering:pixelated;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-8px)}}
.tagline{color:#25405a;font-weight:600;margin:4px 0 0;font-size:15px;text-shadow:0 1px 0 #fff}

nav{position:relative;z-index:6;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 10px 6px;max-width:1000px;margin:0 auto}
.tab{border:3px solid var(--line);background:#fff;border-radius:16px;padding:8px 14px;font-size:15px;font-weight:700;
  color:var(--ink);box-shadow:0 4px 0 var(--line);transition:transform .08s,box-shadow .08s,background .15s;display:flex;align-items:center;gap:7px}
.tab img{width:28px;height:28px;object-fit:contain;image-rendering:pixelated}
.tab svg{width:26px;height:26px;flex:none;display:block}
.house .plat svg{width:56px;height:56px;display:block;margin:0 auto}
.hero .mascotsvg{width:104px;height:104px;flex:none;display:flex;align-items:center;justify-content:center}
.hero .mascotsvg svg{width:92px;height:92px;stroke-width:1.6}
.tab:hover{transform:translateY(-2px);background:#fff7d6}
.tab:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.tab.on{background:var(--electric);box-shadow:0 4px 0 var(--electric2);transform:translateY(-1px)}

/* ---- stage / rooms ---- */
main{position:relative;z-index:5;max-width:1040px;margin:10px auto 60px;padding:0 14px}
.room{display:none;animation:pop .3s cubic-bezier(.2,1.3,.4,1)}
.room.on{display:block}
@keyframes pop{from{transform:scale(.96) translateY(10px);opacity:0}to{transform:none;opacity:1}}
.panel{background:var(--card);border:4px solid var(--line);border-radius:26px;box-shadow:0 10px 0 var(--shadow);padding:22px;margin-bottom:18px}
.panel h2{margin:0 0 4px;font-size:30px;display:flex;align-items:center;gap:12px}
.panel .sub{color:#5a708a;font-weight:600;margin:0 0 14px}
.mascot{width:104px;height:104px;object-fit:contain;image-rendering:pixelated;animation:bob 2.2s ease-in-out infinite;flex:none;
  filter:drop-shadow(0 4px 3px rgba(0,0,0,.14))}
.bubble{position:relative;background:#fff;border:3px solid var(--line);border-radius:16px;padding:13px 18px;font-weight:600;box-shadow:0 4px 0 var(--shadow);flex:1;min-width:240px;max-width:860px;font-size:16px;line-height:1.45;text-wrap:balance}
.bubble:before{content:'';position:absolute;left:-14px;top:22px;border:8px solid transparent;border-right-color:var(--line)}
.bubble:after{content:'';position:absolute;left:-9px;top:22px;border:8px solid transparent;border-right-color:#fff}
.hero{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.hero > div{flex:1;min-width:260px}
.panel h2{margin-top:0}
.chip{display:none}
.speedbar{height:12px;border-radius:8px;background:#e7eefc;border:2px solid var(--line);overflow:hidden;margin-top:6px}
.speedbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--electric),var(--electric2))}

/* ---- town map ---- */
.map{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px}
.house{position:relative;border:4px solid var(--line);border-radius:22px;padding:36px 12px 16px;text-align:center;background:#fff;
  box-shadow:0 7px 0 var(--shadow);cursor:pointer;overflow:hidden;transition:transform .14s cubic-bezier(.3,1.5,.4,1),box-shadow .14s}
.house:hover{transform:translateY(-6px) rotate(-1.5deg);box-shadow:0 13px 0 var(--shadow)}
.house:hover img{animation:hop .5s ease-in-out infinite}
.house:active{transform:translateY(2px);box-shadow:0 3px 0 var(--shadow)}
.house .roof{position:absolute;inset:-4px -4px auto -4px;height:30px;border-radius:18px 18px 50% 50%/18px 18px 26px 26px;border-bottom:3px solid var(--line)}
.house .tint{position:absolute;left:0;right:0;top:26px;bottom:0;opacity:.13;z-index:0}
.house .plat{position:relative;z-index:1;margin-top:2px}
.house .plat:after{content:'';position:absolute;left:50%;bottom:2px;transform:translateX(-50%);width:82px;height:15px;
  background:#e3f1ff;border:2px solid var(--line);border-radius:50%;z-index:-1}
.house img{width:82px;height:82px;object-fit:contain;image-rendering:pixelated;animation:bob 2.6s ease-in-out infinite;
  filter:drop-shadow(0 3px 2px rgba(0,0,0,.14))}
.house b{position:relative;z-index:1;display:block;margin-top:10px;font-size:17px}
.house small{position:relative;z-index:1;color:#6a7f97;font-weight:600;font-size:12px}
@keyframes hop{50%{transform:translateY(-11px) scale(1.06)}}
/* ---- per-room floating mascot advisor, each with its own personality ---- */
.advisor{position:fixed;z-index:36;width:78px;height:78px;pointer-events:auto;opacity:.9}
.advisor .tip{pointer-events:none}
.advisor .anim{width:100%;height:100%;display:block;cursor:help}
.advisor img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 3px 4px rgba(0,0,0,.16))}
.advisor .tip{position:absolute;bottom:70px;right:2px;min-width:152px;max-width:236px;background:#fff;border:3px solid var(--line);border-radius:14px;padding:8px 11px;font-size:12.5px;font-weight:600;color:#2a3b52;box-shadow:0 4px 0 var(--shadow);opacity:0;transform:translateY(6px);transition:opacity .45s,transform .45s}
.advisor .tip.show{opacity:1;transform:none}
.advisor .tip:after{content:"";position:absolute;bottom:-10px;right:22px;border:7px solid transparent;border-top-color:#fff}
/* JOLTEON — twitchy, electric, fast */
@keyframes p-zap{0%,100%{transform:translateY(0) rotate(0)}20%{transform:translateY(-4px) rotate(-4deg)}40%{transform:translateY(-2px) rotate(3deg)}60%{transform:translateY(-6px) scale(1.06)}80%{transform:translateY(-1px) rotate(-2deg)}}
.p-jolteon{animation:p-zap .5s steps(5,end) infinite}
/* MEDICHAM — disciplined, still, then a sharp strike */
@keyframes p-punch{0%,55%,100%{transform:translate(0,0) scale(1)}64%{transform:translate(-6px,-2px) scale(1.05)}72%{transform:translate(6px,0) scale(1.05)}80%{transform:translate(0,0)}}
.p-medicham{animation:p-punch 2.6s ease-in-out infinite}
/* DITTO — squishy, gooey, playful */
@keyframes p-wobble{0%,100%{transform:scale(1,1)}30%{transform:scale(1.1,.9)}60%{transform:scale(.92,1.08) rotate(3deg)}}
.p-ditto{animation:p-wobble 1.5s ease-in-out infinite}
/* KADABRA — hovering, aloof, psychic drift */
@keyframes p-float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-11px) rotate(3deg)}}
.p-kadabra{animation:p-float 3.6s ease-in-out infinite}
/* SLOWKING — regal, unhurried sway */
@keyframes p-sway{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-4px) rotate(1.5deg)}}
.p-slowking{animation:p-sway 5s ease-in-out infinite}
/* CHOMP — coiled, then lunges */
@keyframes p-lunge{0%,68%,100%{transform:translateX(0) scale(1)}78%{transform:translateX(-12px) scale(1.08)}86%{transform:translateX(3px) scale(1.02)}}
.p-chomp{animation:p-lunge 2.1s cubic-bezier(.5,0,.3,1) infinite}
/* ABRA (town) — sleepy bob */
@keyframes p-drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.p-town{animation:p-drift 2.9s ease-in-out infinite}
@media(max-width:1180px){.advisor{display:none}}

/* ---- JOLTEON battle booth ---- */
.booth{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:start}
.booth.two{grid-template-columns:1fr 1fr}
@media(max-width:760px){.booth{grid-template-columns:1fr}}
.side{border:3px dashed var(--line);border-radius:18px;padding:12px;background:#f7fbff}
.side.you{background:#f2fff5}.side.rival{background:#fff2f6}
.side h3{margin:0 0 8px;font-size:20px;text-align:center}
.slots{display:flex;gap:6px;justify-content:center;min-height:60px;flex-wrap:wrap}
.slot{position:relative;width:52px;height:52px;border:2px solid var(--line);border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center}
.slot img{width:48px;height:48px;object-fit:contain;image-rendering:pixelated}
.slotx{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;border:2px solid var(--line);background:#ff6b6b;color:#fff;font-weight:800;font-size:12px;line-height:1;display:none;cursor:pointer;padding:0;align-items:center;justify-content:center}
.slot:hover .slotx{display:flex}
.clearx{align-self:center;border:2px solid var(--line);background:#fff;border-radius:10px;font-weight:700;font-size:12px;padding:3px 9px;cursor:pointer;margin-left:2px}
.clearx:hover{background:#ffe0e0}
.pksearch{width:100%;border:3px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;margin:10px 0 6px;font-family:'Fredoka',sans-serif}
.picker{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:6px;max-height:420px;overflow-y:auto;overflow-x:hidden;padding:6px;
  border:2px dashed #b9cfe6;border-radius:12px;background:#fbfdff;scrollbar-gutter:stable}
.pk{width:54px;height:54px;border:2px solid var(--line);border-radius:11px;background:#fff;padding:0;position:relative;transition:transform .08s}
.pk img{width:50px;height:50px;object-fit:contain;image-rendering:pixelated}
.pk:hover{transform:scale(1.07);background:#fff7d6;z-index:2}
.pk.sel{background:var(--electric);box-shadow:0 0 0 2px var(--electric2)}
.vs{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-width:120px}
.vsbadge{font-family:'Baloo 2';font-size:34px;color:#fff;background:var(--fight);border:3px solid var(--line);border-radius:50%;
  width:66px;height:66px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 var(--shadow);animation:bob 2s ease-in-out infinite}
.battlebtn{border:3px solid var(--line);background:var(--electric);color:var(--ink);font-size:20px;padding:10px 22px;border-radius:16px;box-shadow:0 5px 0 var(--electric2)}
.battlebtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--electric2)}
.meterwrap{margin-top:16px;border:3px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;height:44px;position:relative;display:flex}
.mYou{background:linear-gradient(90deg,#5fd07a,#39b85f);width:50%;transition:width 1s cubic-bezier(.3,1.2,.4,1)}
.mRiv{background:linear-gradient(90deg,#ff9bbb,#ff6b8f);flex:1;transition:width 1s}
.meterwrap b{position:absolute;top:50%;transform:translateY(-50%);font-family:'Baloo 2';color:#fff;font-size:18px;text-shadow:0 2px 0 var(--shadow)}
.readout{margin-top:12px;text-align:center;font-weight:600;color:#3a5372;min-height:24px}
.zap{display:inline-block;width:12px;height:16px;vertical-align:-3px;background:#ffd23f;
  clip-path:polygon(48% 0,100% 0,58% 42%,92% 42%,18% 100%,44% 55%,4% 55%);
  filter:drop-shadow(0 0 3px #ffd23f);animation:zapflash .7s steps(2,jump-none) infinite}
@keyframes zapflash{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.85)}}
.pastebox{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:680px){.pastebox{grid-template-columns:1fr}}
.pastecol label{font-weight:700;font-size:13px;display:block;margin-bottom:4px}
.pastecol textarea{width:100%;height:88px;border:3px solid var(--line);border-radius:12px;padding:8px;font-family:'Fredoka',system-ui,sans-serif;font-size:12px;resize:vertical;background:#fff}
.savedwrap{margin-top:14px;border-top:2px dashed var(--line);padding-top:10px}
.savedhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.savedbar{display:flex;gap:10px;flex-wrap:wrap}
.savedteam{border:2px solid var(--line);border-radius:12px;padding:6px 6px 4px;background:#f7fbff}
.savedteam .m{display:flex;gap:1px}
.savedteam img{width:30px;height:30px;object-fit:contain;image-rendering:pixelated}
.savedteam .b{display:flex;gap:4px;margin-top:4px;justify-content:center}
.savedteam .b button{border:2px solid var(--line);background:#fff;border-radius:7px;font-size:12px;font-weight:700;padding:2px 8px;cursor:pointer}
.savedteam .b button:hover{background:#fff7d6}
.mcbox{width:100%;height:68px;border:3px solid var(--line);border-radius:12px;padding:8px;font-family:'Fredoka',system-ui,sans-serif;font-size:12px;resize:vertical;margin-top:4px}
.minibtn{border:2px solid var(--line);background:var(--electric);border-radius:9px;padding:2px 8px;font-size:12px;font-weight:700;box-shadow:0 2px 0 var(--electric2)}
.minibtn:active{transform:translateY(2px);box-shadow:none}

/* ---- info blocks ---- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.grid2{grid-template-columns:1fr}}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.stat{background:#eaf6ff;border:3px solid var(--line);border-radius:16px;padding:14px 10px;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-height:92px;min-width:0}
.stat b{display:block;font-family:'Baloo 2';font-size:clamp(22px,4.4vw,32px);color:var(--electric2);line-height:1;
  white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.stat span{font-weight:600;font-size:13px;color:#4a6a8a;line-height:1.25}
.tier{display:flex;align-items:center;gap:12px;border:3px solid var(--line);border-radius:16px;padding:10px 12px;margin:8px 0;background:#fff}
.tier img{width:56px;height:56px;image-rendering:pixelated;flex:none}
.tier .g{flex:1}
.tier .cost{font-family:'Baloo 2';font-size:13px;padding:3px 8px;border-radius:999px;border:2px solid var(--line);white-space:nowrap}
.link{display:inline-block;margin:4px 6px 0 0;border:3px solid var(--line);background:#fff;border-radius:14px;padding:7px 12px;font-weight:700;color:var(--ink);text-decoration:none;box-shadow:0 4px 0 var(--shadow)}
.link:hover{background:#fff7d6;transform:translateY(-2px)}
.tag2{font-size:12px;background:#ffe08a;border:2px solid var(--line);border-radius:8px;padding:1px 7px;font-weight:700}
/* ---- KADABRA battle scenes ---- */
.stage{position:relative;border:3px solid var(--line);border-radius:16px;overflow:hidden;height:220px;
  background:linear-gradient(#bfe3ff 0%,#dff1ff 54%,#c7ebac 54%,#9ed17f 100%);margin:8px 0}
.stage .side{position:absolute;display:flex;gap:16px}
.stage .foe{top:14px;right:22px}
.stage .you{bottom:8px;left:22px}
.bmon{width:96px;text-align:center;animation:bob 2.8s ease-in-out infinite}
.bmon img{width:82px;height:82px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 4px 2px rgba(0,0,0,.25))}
.bmon.faint{opacity:.35;filter:grayscale(1)}
.bmon .nm{font-family:'Baloo 2';font-size:12px;font-weight:700;background:#ffffffd8;border:2px solid var(--line);border-radius:7px;padding:0 6px;display:inline-block}
.hpbar{height:8px;border:2px solid var(--line);border-radius:6px;background:#fff;overflow:hidden;margin:3px auto;width:74px}
.hpbar>i{display:block;height:100%;transition:width .6s cubic-bezier(.3,1.2,.4,1)}
.statuschip{font-size:11px;border:1px solid var(--line);border-radius:4px;padding:0 3px;background:#ffd23f;font-weight:700;text-transform:uppercase}
.kadlogline{font-weight:600;color:#4a6a8a;font-size:13px;margin:3px 0}
.kadpop{display:flex;gap:12px;align-items:flex-start;margin-top:10px;animation:pop .45s cubic-bezier(.2,1.5,.4,1)}
.kadpop img{width:74px;height:74px;object-fit:contain;image-rendering:pixelated;animation:bob 2s ease-in-out infinite;flex:none}
.kadpop .bubble{flex:1;border-width:3px}
.kadstep{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:12px}
.kadstep button{border:3px solid var(--line);background:var(--electric);border-radius:12px;padding:6px 16px;font-weight:800;box-shadow:0 3px 0 var(--electric2)}
.kadstep button:active{transform:translateY(2px);box-shadow:none}
.kdot{width:10px;height:10px;border-radius:50%;border:2px solid var(--line);background:#fff;cursor:pointer;display:inline-block}
.kdot.on{background:var(--electric)}
#threattable{max-height:440px;overflow:auto;border:3px solid var(--line);border-radius:14px;margin-top:8px}
.ttab{width:100%;border-collapse:collapse;font-size:13px}
.ttab th{position:sticky;top:0;background:#1E2761;color:#fff;padding:7px 8px;cursor:pointer;font-family:'Baloo 2',sans-serif;font-size:12px;white-space:nowrap}
.ttab th.on{background:#3550b0}
.ttab th:hover{background:#33449c}
.ttab .tnh{text-align:left}
.ttab td{border-bottom:1px solid #e6ecf7;padding:4px 8px;text-align:center}
.ttab td.rk{color:#8aa;font-weight:700;width:26px}
.ttab .tn{text-align:left;font-weight:700}
.ttab .tn img{width:34px;height:34px;object-fit:contain;image-rendering:pixelated;vertical-align:middle;margin-right:6px}
.ttab tbody tr:hover td{background:#f2f6ff}
footer{position:relative;z-index:5;text-align:center;color:#3a5372;font-weight:600;padding:0 0 30px}
canvas#confetti{position:fixed;inset:0;z-index:40;pointer-events:none}
.walker{position:fixed;bottom:10px;z-index:4;width:60px;height:60px;object-fit:contain;image-rendering:pixelated;pointer-events:none}
.tp{position:fixed;z-index:1;width:52px;height:52px;object-fit:contain;image-rendering:pixelated;pointer-events:none;opacity:0;
  transition:opacity .45s ease, transform .45s cubic-bezier(.3,1.4,.4,1);filter:drop-shadow(0 0 7px #ffe680)}
.tp.in{opacity:.85;transform:scale(1) rotate(0)}
.tp.out{opacity:0;transform:scale(.15) rotate(25deg)}
.tpring{position:fixed;z-index:1;width:52px;height:52px;pointer-events:none;border:3px solid #ffd23f;border-radius:50%;
  animation:tpr .7s ease-out forwards;box-shadow:0 0 14px #ffd23f}
@keyframes tpr{from{opacity:.9;transform:scale(.3)}to{opacity:0;transform:scale(2.3)}}
</style>
</head>
<body>
<div class="sky" id="sky"></div>
<svg class="mountain" viewBox="0 0 1440 120" preserveAspectRatio="none"><polygon points="0,120 240,20 420,120" fill="#fff"/><polygon points="300,120 600,10 900,120" fill="#eef8ff"/><polygon points="780,120 1080,30 1380,120" fill="#fff"/></svg>
<canvas id="confetti"></canvas>

<header>
  <div class="logo" onclick="go('town')" style="cursor:pointer" title="back to Town">
    <img src="https://play.pokemonshowdown.com/sprites/ani/abra.gif" alt="Abra">
    <h1>ABRA&nbsp;WORLD</h1>
    <img src="https://play.pokemonshowdown.com/sprites/ani/kadabra.gif" alt="Kadabra">
  </div>
  <p class="tagline">A little snowy town of machine-learning models for Pokémon Champions </p>
</header>

<nav id="nav"></nav>

<main id="stage"></main>

<footer style="margin-bottom:96px"><a href="https://willhoop.github.io" target="_blank" style="color:#1E2761;font-weight:800;text-decoration:underline">Built by Will Hooper</a> · ABRA = <b>A</b>utomated <b>B</b>attle <b>R</b>eplay <b>A</b>nalyzer · grounded in real ladder games, evaluated honestly, and built to learn from self-play over time.</footer>

function mcBuild(n){return n.map(x=>{const m=MC.mons[x];return m?{k:x,t:m.t,st:m.st,mv:m.mv,item:m.item,ab:m.ab}:null;}).filter(Boolean);}
function mcEff(t,dt){let e=1;const r=MC.C[t];if(!r)return 1;for(const d of dt)if(r[d]!=null)e*=r[d];return e;}
function mcDmg(a,d,ctx){let b={pct:0,minPct:0,pKO:0};for(const id of a.mv){const mv=MC.moves[id];if(!mv||!mv.bp)continue;const ph=mv.c==='P',A=ph?a.st.at:a.st.sa,D=ph?d.st.df:d.st.sd,e=mcEff(mv.t,d.t);if(e===0)continue;const stab=a.t.includes(mv.t)?1.5:1;let wx=1;if(ctx.weather==='rain'){if(mv.t==='Water')wx=1.5;if(mv.t==='Fire')wx=.5;}if(ctx.weather==='sun'){if(mv.t==='Fire')wx=1.5;if(mv.t==='Water')wx=.5;}let dd=Math.floor(Math.floor(22*mv.bp*A/D)/50)+2;if(wx!==1)dd=Math.round(dd*wx);const HP=d.st.hp;let mx=0,mn=1e9,ko=0;for(let r=85;r<=100;r++){let x=Math.floor(dd*r/100);if(stab!==1)x=Math.round(x*stab);x=Math.floor(x*e);if(a.item==='lifeorb')x=Math.round(x*1.3);if(x>mx)mx=x;if(x<mn)mn=x;if(x>=HP)ko++;}const pct=100*mx/HP;if(pct>b.pct)b={pct,minPct:100*mn/HP,pKO:ko/16};}return b;}
function mcSpd(m,tw,par){let s=m.st.sp;if(m.item==='choicescarf')s=Math.floor(s*1.5);if(tw)s*=2;if(par)s/=4;return s;}
function mcRoll(A,B){const hpA=A.map(()=>100),hpB=B.map(()=>100);const wof=t=>{for(const m of t){if(m.ab==='drizzle')return'rain';if(m.ab==='drought')return'sun';}return null;};const wa=wof(A),wb=wof(B),weather=(wa&&wb)?null:(wa||wb);const sA=A.map(()=>({st:null,slp:0,boost:0,prot:false})),sB=B.map(()=>({st:null,slp:0,boost:0,prot:false}));const f={twA:0,twB:0};let ai=0,bi=0;const act=(T,S,i,foe,side,hp)=>{const me=T[i];if(S[i].st==='slp'&&S[i].slp>0)return{k:'sleep'};const mn=mcDmg(me,foe,{weather});if(mn.pct<25){let bv=-1,bx=-1;for(let j=0;j<T.length;j++){if(j===i||hp[j]<=0)continue;const x=mcDmg(T[j],foe,{weather});if(x.pKO>bv){bv=x.pKO;bx=j;}}if(bx>=0&&bv>0.5&&Math.random()<0.5)return{k:'switch',idx:bx};}const pr=MC.priors[me.k];if(pr){let r=Math.random(),p=null;for(const q of pr){r-=q[1];if(r<=0){p={mv:q[0],kind:q[2]};break;}}if(p){const safe=mcDmg(foe,me,{weather}).pKO<0.5;if(p.kind==='setup'&&safe&&S[i].boost<4)return{k:'setup'};if(p.kind==='speed'&&safe&&(side==='A'?f.twA:f.twB)<=0)return{k:'tw',side};if(p.kind==='status'&&!S[i].st)return{k:'status'};if(p.kind==='protect'&&!S[i].prot&&Math.random()<0.7)return{k:'protect'};}}return{k:'attack'};};for(let t=0;t<24;t++){if(hpA.every(h=>h<=0)||hpB.every(h=>h<=0))break;const aA=act(A,sA,ai,B[bi],'A',hpA),aB=act(B,sB,bi,A[ai],'B',hpB);if(aA.k==='switch'){ai=aA.idx;sA[ai].boost=0;}if(aB.k==='switch'){bi=aB.idx;sB[bi].boost=0;}sA[ai].prot=false;sB[bi].prot=false;const ap=(a,self,fs,fi,side)=>{if(a.k==='setup')self.boost=Math.min(6,self.boost+2);else if(a.k==='tw'){if(side==='A')f.twA=4;else f.twB=4;}else if(a.k==='status'&&!fs[fi].st){fs[fi].st=['brn','par','slp'][Math.floor(Math.random()*3)];if(fs[fi].st==='slp')fs[fi].slp=1+Math.floor(Math.random()*2);}self.prot=(a.k==='protect');};ap(aA,sA[ai],sB,bi,'A');ap(aB,sB[bi],sA,ai,'B');const mv=[];if(aA.k==='attack')mv.push('A');if(aB.k==='attack')mv.push('B');const sp=s=>s==='A'?mcSpd(A[ai],f.twA>0,sA[ai].st==='par'):mcSpd(B[bi],f.twB>0,sB[bi].st==='par');mv.sort((x,y)=>sp(y)-sp(x)||(Math.random()<0.5?-1:1));const ft={A:false,B:false};for(const s of mv){if(ft[s])continue;const aS=s==='A'?sA[ai]:sB[bi];if(aS.st==='par'&&Math.random()<0.25)continue;if(s==='A'?sB[bi].prot:sA[ai].prot)continue;const at=s==='A'?A[ai]:B[bi],de=s==='A'?B[bi]:A[ai];const d=mcDmg(at,de,{weather});let g=d.minPct+Math.random()*(d.pct-d.minPct);if(aS.boost)g*=(2+aS.boost)/2;if(aS.st==='brn'&&at.st.at>=at.st.sa)g*=0.5;if(s==='A'){hpB[bi]-=g;if(hpB[bi]<=0){ft.B=true;let nx=-1,bv=-1;for(let j=0;j<B.length;j++)if(hpB[j]>0){const x=mcDmg(B[j],A[ai],{weather});if(x.pKO>bv){bv=x.pKO;nx=j;}}if(nx<0)break;bi=nx;sB[bi].boost=0;}}else{hpA[ai]-=g;if(hpA[ai]<=0){ft.A=true;let nx=-1,bv=-1;for(let j=0;j<A.length;j++)if(hpA[j]>0){const x=mcDmg(A[j],B[bi],{weather});if(x.pKO>bv){bv=x.pKO;nx=j;}}if(nx<0)break;ai=nx;sA[ai].boost=0;}}}for(const[arr,S,i]of[[hpA,sA,ai],[hpB,sB,bi]]){const s=S[i];if(s.st==='brn'&&arr[i]>0)arr[i]-=6.25;if(s.st==='slp'){if(s.slp>0)s.slp--;if(s.slp<=0||Math.random()<0.34)s.st=null;}}if(f.twA>0)f.twA--;if(f.twB>0)f.twB--;}const a2=hpA.filter(h=>h>0).length,b2=hpB.filter(h=>h>0).length;if(a2!==b2)return a2>b2?1:0;const hA=hpA.reduce((s,h)=>s+Math.max(0,h),0),hB=hpB.reduce((s,h)=>s+Math.max(0,h),0);return hA>hB?1:(hA<hB?0:0.5);}

// sprite fallback chain: animated gif -> static gen5 png (near-complete form coverage)
// -> base-species static -> substitute. Fixes forms that lack an animated sprite.
function sprFallback(img){ const s=+(img.dataset.g||0);
  if(s===0){ img.dataset.g=1; img.src=img.src.replace('/sprites/ani/','/sprites/gen5/').replace('.gif','.png'); return; }
  if(s===1 && img.dataset.base){ img.dataset.g=2; img.src='https://play.pokemonshowdown.com/sprites/gen5/'+img.dataset.base+'.png'; return; }
  img.onerror=null; img.src='https://play.pokemonshowdown.com/sprites/ani/substitute.gif'; }
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
function niceName(k){return k?String(k).replace(/([a-z])([A-Z])/g,'$1 $2').replace(/\b\w/g,c=>c.toUpperCase()):'—';}
function mean(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0.5;}
// matchup term: how much harder A's STAB types hit B's team than the reverse.
// This is what stops two equally-strong-but-differently-shaped teams reading ~50%.
function typeEdge(A,B){
  const eff=(atkN,defN)=>{const at=MC.mons[atkN]&&MC.mons[atkN].t,dt=MC.mons[defN]&&MC.mons[defN].t;if(!at||!dt)return 1;let best=0;for(const t of at)best=Math.max(best,mcEff(t,dt));return best;};
  const oneWay=(X,Y)=>{let s=0,c=0;for(const x of X)for(const y of Y){s+=eff(x,y);c++;}return c?s/c:1;};
  return oneWay(A,B)-oneWay(B,A);
}
function pwin(A,B){ // A,B arrays of species names -> P(A beats B), the real JOLTEON logistic
  let s=0; A.forEach(n=>s+=(BY[n]?.w||0)); B.forEach(n=>s-=(BY[n]?.w||0));
  s+=JOLT.wSpeed*(mean(A.map(n=>BY[n]?.spd??0.5))-mean(B.map(n=>BY[n]?.spd??0.5)));
  s+=JOLT.wFire *(mean(A.map(n=>BY[n]?.fire??0.5))-mean(B.map(n=>BY[n]?.fire??0.5)));
  s+=0.55*typeEdge(A,B);   // team-vs-team type coverage — the missing matchup signal
  return 1/(1+Math.exp(-s));
}

function cycleSVG(labels){
  const pts=[[190,36],[330,176],[50,176]], col=['#3a86c0','#e0863a','#7a6bff'];
  const mid=(a,b)=>[(pts[a][0]+pts[b][0])/2,(pts[a][1]+pts[b][1])/2];
  const line=(a,m)=>`<line x1="${pts[a][0]}" y1="${pts[a][1]}" x2="${m[0]}" y2="${m[1]}" stroke="#aab4c6" stroke-width="3.5" marker-end="url(#ah)"/>`;
  let s=`<svg viewBox="0 0 380 210" style="width:100%;max-width:440px;height:auto;display:block;margin:8px auto">`;
  s+=`<defs><marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8a97ad"/></marker></defs>`;
  s+=line(0,mid(0,1))+line(1,mid(1,2))+line(2,mid(2,0));   // A beats B beats C beats A
  labels.slice(0,3).forEach((l,i)=>{const[x,y]=pts[i];
    s+=`<rect x="${x-62}" y="${y-16}" width="124" height="32" rx="16" fill="#fff" stroke="${col[i]}" stroke-width="2.5"/>`+
       `<text x="${x}" y="${y+5}" text-anchor="middle" font-size="14" font-weight="800" fill="${col[i]}" font-family="Arial">${l}</text>`;});
  return s+`</svg>`;
}

  let svg=`<svg id="abramap" viewBox="0 0 1000 630" style="width:100%;height:auto" font-family="Arial"><defs><marker id="mh" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9aa6bb"/></marker><marker id="mhIn" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2e9e63"/></marker><marker id="mhOut" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e08a2e"/></marker></defs>`;
  // Curved edges. A strictly crossing-free drawing is impossible for this graph (ALAKAZAM has six

/* Hover = unmistakable. Everything unrelated drops to near-invisible; edges INTO the model are
   green (what it reads), edges OUT are orange (who reads it), and the caption spells out both
   directions in words instead of making you trace lines. */
function mapHi(id){
  const IN='#2e9e63', OUT='#e08a2e';
  const lines=[...document.querySelectorAll('#abramap .edge')];
  const nameOf=n=>{const g=document.querySelector('#abramap g.node[data-id="'+n+'"]');return g?(g.dataset.nm||n):n;};
  const feeders=[], readers=[];
  lines.forEach(l=>{
    const into = id && l.dataset.to===id, outof = id && l.dataset.from===id;
    if(into) feeders.push(l.dataset.from); if(outof) readers.push(l.dataset.to);
    l.setAttribute('stroke', into?IN:(outof?OUT:'#c7cede'));
    l.setAttribute('stroke-width', (into||outof)?'4.5':'1.6');
    l.setAttribute('opacity', id?((into||outof)?'1':'0.06'):'0.7');
    l.setAttribute('marker-end', (into||outof)?(into?'url(#mhIn)':'url(#mhOut)'):'url(#mh)');
  });
  document.querySelectorAll('#abramap g.node').forEach(g=>{ const nid=g.dataset.id;
    const box=g.querySelector('rect');
    if(!id){ g.style.opacity=1; if(box){box.setAttribute('stroke-width','2.5'); if(box.dataset.br)box.setAttribute('stroke',box.dataset.br);} return; }
    const isSelf=nid===id, isFeed=feeders.includes(nid), isRead=readers.includes(nid);
    g.style.opacity=(isSelf||isFeed||isRead)?1:0.08;
    if(box) box.setAttribute('stroke-width', isSelf?'5':(isFeed||isRead)?'3.5':'2.5');
    if(box&&(isFeed||isRead)) box.setAttribute('stroke', isFeed?IN:OUT);
    else if(box&&box.dataset.br) box.setAttribute('stroke', box.dataset.br);
  });
  const tip=document.getElementById('maptip');
  if(!tip) return;
  if(!id){ tip.innerHTML='<b>Hover any model</b> — it lights up what feeds it and what it feeds.'; return; }
  const g2=document.querySelector('#abramap g.node[data-id="'+id+'"]'); if(!g2) return;
  const me=g2.dataset.nm||id;
  const f=feeders.length?feeders.map(nameOf).join(', '):'nothing — it reads the raw store';
  const r=readers.length?readers.map(nameOf).join(', '):'nothing yet — it is the end of the line';
  tip.innerHTML=`<b style="font-size:15px">${me}</b> — ${g2.dataset.plain||''}<br>`+
    `<span style="color:${IN};font-weight:800">▸ reads from:</span> ${f}<br>`+
    `<span style="color:${OUT};font-weight:800">▸ feeds into:</span> ${r}`;
}

function kadBuild(log, meName){
  const L=log.split('\n'); const P={p1:'',p2:''};
  const cur={p1a:null,p1b:null,p2a:null,p2b:null};
  const nm=(meName||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const pct=s=>{ if(!s)return 0; if(/fnt/.test(s)||/^0\b/.test(s))return 0; const m=String(s).match(/(\d+)\/(\d+)/); if(m)return Math.max(0,Math.round(100*(+m[1])/(+m[2]))); const n=parseInt(s); return isNaN(n)?100:n; };
  const stf=s=>{ const m=String(s||'').match(/\b(brn|par|slp|psn|tox|frz)\b/); return m?m[1]:''; };
  const slotOf=x=>String(x).split(':')[0].trim();
  const setSlot=(slot,species,hpstr)=>{ cur[slot]={sp:spriteName(species).sprite, hp:pct(hpstr), st:stf(hpstr), name:species}; };
  const cleanN=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
  const meSide=()=> (nm && cleanN(P.p2).includes(nm) && !cleanN(P.p1).includes(nm)) ? 'p2':'p1';
  let turn=0, faints=[], tlog=[]; const scenes=[]; let result='(unfinished)';
  const cf={p1:0,p2:0};                        // cumulative faints per side (bring-4) for PORY win%
  const flush=()=>{ if(!faints.length)return; const side=meSide(), foeS=side==='p1'?'p2':'p1';
    const you=[cur[side+'a'],cur[side+'b']].filter(Boolean).map(m=>({sp:m.sp,hp:m.hp,st:m.st}));
    const foe=[cur[foeS+'a'],cur[foeS+'b']].filter(Boolean).map(m=>({sp:m.sp,hp:m.hp,st:m.st}));
    const mine=faints.filter(f=>f.slot.startsWith(side)).map(f=>cap(f.name));
    const theirs=faints.filter(f=>f.slot.startsWith(foeS)).map(f=>cap(f.name));

    const myAct=[cur[side+'a'],cur[side+'b']].filter(m=>m&&m.hp>0), foeAct=[cur[foeS+'a'],cur[foeS+'b']].filter(m=>m&&m.hp>0);

    else if(theirs.length){ kind='good'; coach=`Good — you KO'd ${theirs.join(' & ')} and you're up a body. Keep the pressure: bring your win condition in safely and don't hand the tempo back.`; }

    else if(t==='-damage'||t==='-sethp'){ const s=slotOf(p[2]); if(cur[s]){cur[s].hp=pct(p[3]); const st=stf(p[3]); if(st)cur[s].st=st;} }

    else if(t==='-status'){ const s=slotOf(p[2]); if(cur[s])cur[s].st=p[3]; }

function poryWin(myAlive,foeAlive,myHp,foeHp,turn){

function spriteName(raw){

    'frost','mow','fan','dusk','midnight','bloodmoon','rapidstrike','singlestrike','crowned','hero','ice'];

function parsePaste(text){
  const names=[];
  (text||'').split(/\n\s*\n/).forEach(block=>{

    let name=first.split('@')[0].trim();

  });

/* gently teleporting Abras in the background  */
function makeAbra(){   /* roaming teleporting Abra sprites in the side margins */
  const a=document.createElement('img'); a.className='tp'; a.src=ani('abra'); document.body.appendChild(a);
  const place=()=>{ const right=Math.random()<0.5; a.style.left=right?(89+Math.random()*9)+'vw':(1.5+Math.random()*9)+'vw'; a.style.top=(14+Math.random()*72)+'vh'; };  // stay in the empty side margins, never over the content column
  const ring=()=>{ const r=document.createElement('div'); r.className='tpring'; r.style.left=a.style.left; r.style.top=a.style.top;
    document.body.appendChild(r); setTimeout(()=>r.remove(),700); };
  place();
  const loop=()=>{
    a.classList.remove('in'); a.classList.add('out');            // teleport out
    setTimeout(()=>{ place(); a.classList.remove('out'); a.classList.add('in'); ring(); }, 500);  // blink in elsewhere
    setTimeout(loop, 2600+Math.random()*3400);
  };
  setTimeout(()=>{ a.classList.add('in'); ring(); loop(); }, Math.random()*2600);
}
for(let i=0;i<5;i++) makeAbra();

const cvs=document.getElementById('confetti'),ctx=cvs.getContext('2d');
function fit(){cvs.width=innerWidth;cvs.height=innerHeight;}fit();addEventListener('resize',fit);
let parts=[];
function burst(good){const cols=good?['#ffd23f','#5fd07a','#4fb0ff','#ff6bd6']:['#ff6b57','#ff9bbb','#ffd23f'];
  for(let i=0;i<120;i++)parts.push({x:innerWidth/2,y:innerHeight/3,vx:(Math.random()-.5)*12,vy:-Math.random()*12-3,
    c:cols[i%cols.length],r:4+Math.random()*5,a:1,rot:Math.random()*6}); requestAnimationFrame(tick);}
function tick(){ctx.clearRect(0,0,cvs.width,cvs.height);parts.forEach(p=>{p.vy+=.35;p.x+=p.vx;p.y+=p.vy;p.a-=.012;p.rot+=.2;
  ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=p.c;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);ctx.restore();});
  parts=parts.filter(p=>p.a>0&&p.y<innerHeight+20); if(parts.length) requestAnimationFrame(tick);}
