<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABRA WORLD — the Champions modeling town</title>
<style>
/* ============ ABRA WORLD — Club-Penguin-meets-Pokemon ============ */
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@500;600;700&display=swap');
:root{
  --sky1:#8fd3ff; --sky2:#c9efff; --snow:#f4fbff; --ink:#20344a;
  --line:#20344a;
  --electric:#ffd23f; --electric2:#ffb300;
  --fight:#ff6b57; --psy:#ff6bd6; --water:#4fb0ff; --grass:#5fd07a; --dragon:#7a6bff;
  --card:#ffffff; --shadow:rgba(32,52,74,.28);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:'Fredoka',system-ui,sans-serif;color:var(--ink);overflow-x:hidden}
body{background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 42%,var(--snow) 42%,var(--snow) 100%);min-height:100vh}
h1,h2,h3,.baloo{font-family:'Baloo 2',cursive}
button{font-family:'Baloo 2',cursive;cursor:pointer}

/* ---- sky layer ---- */
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.cloud{position:absolute;background:#fff;border-radius:50%;filter:blur(.3px);opacity:.9;
  box-shadow:40px 8px 0 6px #fff,90px 0 0 0px #fff,-38px 10px 0 0 #fff;animation:drift linear infinite}
@keyframes drift{from{transform:translateX(-20vw)}to{transform:translateX(120vw)}}
.snowf{position:absolute;top:-10px;color:#fff;opacity:.9;animation:fall linear infinite;text-shadow:0 1px 2px rgba(0,0,0,.05)}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg)}}
.mountain{position:fixed;bottom:calc(58vh - 2px);left:0;right:0;height:120px;z-index:0;pointer-events:none}

/* ---- header / tabs ---- */
header{position:relative;z-index:5;text-align:center;padding:18px 12px 6px}
.logo{display:inline-flex;align-items:center;gap:14px}
.logo h1{margin:0;font-size:clamp(34px,7vw,68px);color:#fff;letter-spacing:1px;
  text-shadow:0 4px 0 var(--electric2),0 6px 0 var(--line),0 10px 18px var(--shadow);animation:bob 3s ease-in-out infinite}
.logo img{width:74px;height:74px;image-rendering:pixelated;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-8px)}}
.tagline{color:#25405a;font-weight:600;margin:4px 0 0;font-size:15px;text-shadow:0 1px 0 #fff}

nav{position:relative;z-index:6;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 10px 6px;max-width:1000px;margin:0 auto}
.tab{border:3px solid var(--line);background:#fff;border-radius:16px;padding:8px 14px;font-size:15px;font-weight:700;
  color:var(--ink);box-shadow:0 4px 0 var(--line);transition:transform .08s,box-shadow .08s,background .15s;display:flex;align-items:center;gap:7px}
.tab img{width:28px;height:28px;object-fit:contain;image-rendering:pixelated}
.tab:hover{transform:translateY(-2px);background:#fff7d6}
.tab:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.tab.on{background:var(--electric);box-shadow:0 4px 0 var(--electric2);transform:translateY(-1px)}

/* ---- stage / rooms ---- */
main{position:relative;z-index:5;max-width:1040px;margin:10px auto 60px;padding:0 14px}
.room{display:none;animation:pop .3s cubic-bezier(.2,1.3,.4,1)}
.room.on{display:block}
@keyframes pop{from{transform:scale(.96) translateY(10px);opacity:0}to{transform:none;opacity:1}}
.panel{background:var(--card);border:4px solid var(--line);border-radius:26px;box-shadow:0 10px 0 var(--shadow);padding:22px;margin-bottom:18px}
.panel h2{margin:0 0 4px;font-size:30px;display:flex;align-items:center;gap:12px}
.panel .sub{color:#5a708a;font-weight:600;margin:0 0 14px}
.mascot{width:104px;height:104px;object-fit:contain;image-rendering:pixelated;animation:bob 2.2s ease-in-out infinite;flex:none;
  filter:drop-shadow(0 4px 3px rgba(0,0,0,.14))}
.bubble{position:relative;background:#fff;border:3px solid var(--line);border-radius:16px;padding:11px 16px;font-weight:600;box-shadow:0 4px 0 var(--shadow);flex:1;min-width:240px}
.bubble:before{content:'';position:absolute;left:-14px;top:22px;border:8px solid transparent;border-right-color:var(--line)}
.bubble:after{content:'';position:absolute;left:-9px;top:22px;border:8px solid transparent;border-right-color:#fff}
.hero{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.hero > div{flex:1;min-width:260px}
.chip{display:inline-block;background:#eaf6ff;border:2px solid var(--line);border-radius:999px;padding:3px 10px;font-weight:700;font-size:13px;margin:2px}
.speedbar{height:12px;border-radius:8px;background:#e7eefc;border:2px solid var(--line);overflow:hidden;margin-top:6px}
.speedbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--electric),var(--electric2))}

/* ---- town map ---- */
.map{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px}
.house{position:relative;border:4px solid var(--line);border-radius:22px;padding:36px 12px 16px;text-align:center;background:#fff;
  box-shadow:0 7px 0 var(--shadow);cursor:pointer;overflow:hidden;transition:transform .14s cubic-bezier(.3,1.5,.4,1),box-shadow .14s}
.house:hover{transform:translateY(-6px) rotate(-1.5deg);box-shadow:0 13px 0 var(--shadow)}
.house:hover img{animation:hop .5s ease-in-out infinite}
.house:active{transform:translateY(2px);box-shadow:0 3px 0 var(--shadow)}
.house .roof{position:absolute;inset:-4px -4px auto -4px;height:30px;border-radius:18px 18px 50% 50%/18px 18px 26px 26px;border-bottom:3px solid var(--line)}
.house .tint{position:absolute;left:0;right:0;top:26px;bottom:0;opacity:.13;z-index:0}
.house .plat{position:relative;z-index:1;margin-top:2px}
.house .plat:after{content:'';position:absolute;left:50%;bottom:2px;transform:translateX(-50%);width:82px;height:15px;
  background:#e3f1ff;border:2px solid var(--line);border-radius:50%;z-index:-1}
.house img{width:82px;height:82px;object-fit:contain;image-rendering:pixelated;animation:bob 2.6s ease-in-out infinite;
  filter:drop-shadow(0 3px 2px rgba(0,0,0,.14))}
.house b{position:relative;z-index:1;display:block;margin-top:10px;font-size:17px}
.house small{position:relative;z-index:1;color:#6a7f97;font-weight:600;font-size:12px}
@keyframes hop{50%{transform:translateY(-11px) scale(1.06)}}

/* ---- JOLTEON battle booth ---- */
.booth{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:start}
@media(max-width:760px){.booth{grid-template-columns:1fr}}
.side{border:3px dashed var(--line);border-radius:18px;padding:12px;background:#f7fbff}
.side.you{background:#f2fff5}.side.rival{background:#fff2f6}
.side h3{margin:0 0 8px;font-size:20px;text-align:center}
.slots{display:flex;gap:6px;justify-content:center;min-height:60px;flex-wrap:wrap}
.slot{width:52px;height:52px;border:2px solid var(--line);border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center}
.slot img{width:48px;height:48px;object-fit:contain;image-rendering:pixelated}
.picker{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:10px;max-height:210px;overflow:auto;padding:4px}
.pk{width:46px;height:46px;border:2px solid var(--line);border-radius:10px;background:#fff;padding:0;position:relative;transition:transform .08s}
.pk img{width:42px;height:42px;object-fit:contain;image-rendering:pixelated}
.pk:hover{transform:scale(1.12);background:#fff7d6;z-index:2}
.pk.sel{background:var(--electric);box-shadow:0 0 0 2px var(--electric2)}
.vs{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-width:120px}
.vsbadge{font-family:'Baloo 2';font-size:34px;color:#fff;background:var(--fight);border:3px solid var(--line);border-radius:50%;
  width:66px;height:66px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 var(--shadow);animation:bob 2s ease-in-out infinite}
.battlebtn{border:3px solid var(--line);background:var(--electric);color:var(--ink);font-size:20px;padding:10px 22px;border-radius:16px;box-shadow:0 5px 0 var(--electric2)}
.battlebtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--electric2)}
.meterwrap{margin-top:16px;border:3px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;height:44px;position:relative;display:flex}
.mYou{background:linear-gradient(90deg,#5fd07a,#39b85f);width:50%;transition:width 1s cubic-bezier(.3,1.2,.4,1)}
.mRiv{background:linear-gradient(90deg,#ff9bbb,#ff6b8f);flex:1;transition:width 1s}
.meterwrap b{position:absolute;top:50%;transform:translateY(-50%);font-family:'Baloo 2';color:#fff;font-size:18px;text-shadow:0 2px 0 var(--shadow)}
.readout{margin-top:12px;text-align:center;font-weight:600;color:#3a5372;min-height:24px}
.pastebox{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:680px){.pastebox{grid-template-columns:1fr}}
.pastecol label{font-weight:700;font-size:13px;display:block;margin-bottom:4px}
.pastecol textarea{width:100%;height:88px;border:3px solid var(--line);border-radius:12px;padding:8px;font-family:ui-monospace,monospace;font-size:12px;resize:vertical;background:#fff}
.minibtn{border:2px solid var(--line);background:var(--electric);border-radius:9px;padding:2px 8px;font-size:12px;font-weight:700;box-shadow:0 2px 0 var(--electric2)}
.minibtn:active{transform:translateY(2px);box-shadow:none}

/* ---- info blocks ---- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.grid2{grid-template-columns:1fr}}
.stat{background:#eaf6ff;border:3px solid var(--line);border-radius:16px;padding:12px;text-align:center}
.stat b{display:block;font-family:'Baloo 2';font-size:30px;color:var(--electric2);line-height:1}
.stat span{font-weight:600;font-size:13px;color:#4a6a8a}
.tier{display:flex;align-items:center;gap:12px;border:3px solid var(--line);border-radius:16px;padding:10px 12px;margin:8px 0;background:#fff}
.tier img{width:56px;height:56px;image-rendering:pixelated;flex:none}
.tier .g{flex:1}
.tier .cost{font-family:'Baloo 2';font-size:13px;padding:3px 8px;border-radius:999px;border:2px solid var(--line);white-space:nowrap}
.link{display:inline-block;margin:4px 6px 0 0;border:3px solid var(--line);background:#fff;border-radius:14px;padding:7px 12px;font-weight:700;color:var(--ink);text-decoration:none;box-shadow:0 4px 0 var(--shadow)}
.link:hover{background:#fff7d6;transform:translateY(-2px)}
.tag2{font-size:12px;background:#ffe08a;border:2px solid var(--line);border-radius:8px;padding:1px 7px;font-weight:700}
footer{position:relative;z-index:5;text-align:center;color:#3a5372;font-weight:600;padding:0 0 30px}
canvas#confetti{position:fixed;inset:0;z-index:40;pointer-events:none}
.walker{position:fixed;bottom:10px;z-index:4;width:60px;height:60px;image-rendering:pixelated;pointer-events:none}
.tp{position:fixed;z-index:1;width:52px;height:52px;image-rendering:pixelated;pointer-events:none;opacity:0;
  transition:opacity .45s ease, transform .45s cubic-bezier(.3,1.4,.4,1);filter:drop-shadow(0 0 7px #ffe680)}
.tp.in{opacity:.85;transform:scale(1) rotate(0)}
.tp.out{opacity:0;transform:scale(.15) rotate(25deg)}
.tpring{position:fixed;z-index:1;width:52px;height:52px;pointer-events:none;border:3px solid #ffd23f;border-radius:50%;
  animation:tpr .7s ease-out forwards;box-shadow:0 0 14px #ffd23f}
@keyframes tpr{from{opacity:.9;transform:scale(.3)}to{opacity:0;transform:scale(2.3)}}
</style>
</head>

const BY={}; JOLT.roster.forEach(m=>BY[m.n]=m);
const ani=n=>`https://play.pokemonshowdown.com/sprites/ani/${n}.gif`;
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
function mean(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0.5;}
function pwin(A,B){ // A,B arrays of species names -> P(A beats B), the real JOLTEON logistic
  let s=0; A.forEach(n=>s+=(BY[n]?.w||0)); B.forEach(n=>s-=(BY[n]?.w||0));
  s+=JOLT.wSpeed*(mean(A.map(n=>BY[n]?.spd??0.5))-mean(B.map(n=>BY[n]?.spd??0.5)));
  s+=JOLT.wFire *(mean(A.map(n=>BY[n]?.fire??0.5))-mean(B.map(n=>BY[n]?.fire??0.5)));
  return 1/(1+Math.exp(-s));
}

  renderPick('pickA','A'); renderPick('pickB','B'); renderSlots(); }
function renderPick(elId,side){const el=document.getElementById(elId);if(!el)return;
  el.innerHTML=JOLT.roster.map(m=>`<button class="pk" data-n="${m.n}" data-s="${side}" onclick="toggle('${m.n}','${side}')" title="${cap(m.n)}"><img src="${ani(m.sprite)}"></button>`).join('');
  syncSel();}
function toggle(n,side){const T=side==='A'?teamA:teamB;const i=T.indexOf(n);
  if(i>=0)T.splice(i,1); else {if(T.length>=6){return;} T.push(n);} renderSlots(); syncSel();}
function syncSel(){document.querySelectorAll('.pk').forEach(b=>{const T=b.dataset.s==='A'?teamA:teamB;b.classList.toggle('sel',T.includes(b.dataset.n));});}
function renderSlots(){const sa=document.getElementById('slotsA'),sb=document.getElementById('slotsB');if(!sa)return;
  const cell=n=>`<div class="slot"><img src="${ani(BY[n].sprite)}" title="${cap(n)}"></div>`;
  sa.innerHTML=teamA.map(cell).join('')||'<small style="color:#889">pick some →</small>';
  sb.innerHTML=teamB.map(cell).join('')||'<small style="color:#889">pick some →</small>';}
function randomTeams(){const pool=JOLT.roster.map(m=>m.n);const pick=()=>{const s=new Set();while(s.size<4)s.add(pool[Math.floor(Math.random()*pool.length)]);return[...s];};
  teamA=pick();teamB=pick();renderSlots();syncSel();doBattle();}
function doBattle(){
  if(!teamA.length||!teamB.length){document.getElementById('readout').textContent='Pick at least one Pokémon per side!';return;}
  const p=pwin(teamA,teamB), pa=Math.round(p*100), pb=100-pa;
  document.getElementById('mYou').style.width=pa+'%';
  document.getElementById('mYouL').textContent=pa+'%';
  document.getElementById('mRivL').textContent=pb+'%';
  const fav = pa>pb?'Your team':'Rival team', edge=Math.abs(pa-pb);
  let msg = edge<8?`📛 dead even — this one's a coin flip!`:edge<20?`🟢 ${fav} is favoured (${Math.max(pa,pb)}%).`:`🔥 ${fav} is a big favourite (${Math.max(pa,pb)}%)!`;
  document.getElementById('readout').innerHTML=msg+`  <span style="color:#889">— JOLTEON, live</span>`;
  burst(pa>=pb);
}

/* ===== PokePaste support — accepts ANY species ===== */
function spriteName(raw){
  let s=(raw||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const forms=['alola','galar','hisui','paldea','therian','incarnate','eternal','origin','wash','heat',
    'frost','mow','fan','dusk','midnight','bloodmoon','rapidstrike','singlestrike','crowned','hero','ice'];
  for(const f of forms){ if(s.endsWith(f)&&s.length>f.length+2) return {n:s,sprite:s.slice(0,-f.length)+'-'+f}; }
  return {n:s,sprite:s};
}
function parsePaste(text){
  const names=[];
  (text||'').split(/\n\s*\n/).forEach(block=>{
    const first=(block.trim().split('\n')[0]||'').trim(); if(!first) return;
    let name=first.split('@')[0].trim();
    const paren=first.match(/\(([^)]+)\)/);
    if(paren && !/^[MF]$/i.test(paren[1])) name=paren[1].trim();   // Nick (Species) @ item
    name=name.replace(/\((M|F)\)/gi,'').trim();
    if(name && !/^Ability:|^Level:|^EVs:|^IVs:|^Tera|^-/i.test(name)) names.push(name);
  });
  return names.slice(0,6);
}
function loadPaste(side){
  const raw=parsePaste(document.getElementById('paste'+side).value);
  const team=[]; let off=0;
  raw.forEach(r=>{ const {n,sprite}=spriteName(r); if(!n) return;
    if(!BY[n]){ BY[n]={n,sprite,w:0,spd:0.5,fire:0.5,bring:0,off:true}; off++; }
    else if(BY[n].off) off++;
    team.push(n); });
  if(side==='A') teamA=team; else teamB=team;
  renderSlots(); syncSel();
  const r=document.getElementById('readout');
  r.innerHTML = team.length ? `Loaded ${team.length} into ${side==='A'?'🟢 your':'🔴 rival'} team`+
    (off?` — <b>${off}</b> not yet in JOLTEON's vocabulary, so they're treated as neutral until the ladder feeds it more games.`:' ✓')+' Press BATTLE! ⚡'
    : 'No Pokémon found in that paste — check the format.';
}
/* any sprite that 404s (rare form name) falls back to a Substitute doll */
addEventListener('error', e=>{const t=e.target; if(t&&t.tagName==='IMG'&&!t.dataset.fb){t.dataset.fb='1';
  t.src='https://play.pokemonshowdown.com/sprites/ani/substitute.gif';}}, true);

/* ===== effects: snow, clouds, confetti ===== */
const sky=document.getElementById('sky');
for(let i=0;i<5;i++){const c=document.createElement('div');c.className='cloud';const s=40+Math.random()*40;
  c.style.width=s+'px';c.style.height=s*.6+'px';c.style.top=(5+Math.random()*30)+'%';
  c.style.animationDuration=(30+Math.random()*40)+'s';c.style.animationDelay=(-Math.random()*40)+'s';sky.appendChild(c);}
for(let i=0;i<40;i++){const f=document.createElement('div');f.className='snowf';f.textContent='❄';
  f.style.left=Math.random()*100+'vw';f.style.fontSize=(8+Math.random()*14)+'px';
  f.style.animationDuration=(6+Math.random()*10)+'s';f.style.animationDelay=(-Math.random()*10)+'s';sky.appendChild(f);}
// a waddling Abra along the snow line
const walker=document.createElement('img');walker.className='walker';walker.src=ani('abra');document.body.appendChild(walker);
let wx=-60,wdir=1;setInterval(()=>{wx+=wdir*2;if(wx>innerWidth){wdir=-1;walker.style.transform='scaleX(-1)';}if(wx<-60){wdir=1;walker.style.transform='scaleX(1)';}
  walker.style.left=wx+'px';walker.style.bottom=(10+Math.sin(wx/40)*6)+'px';},40);

/* gently teleporting Abras in the background ✨ */
function makeAbra(){
  const a=document.createElement('img'); a.className='tp'; a.src=ani('abra'); document.body.appendChild(a);
  const place=()=>{ a.style.left=(4+Math.random()*88)+'vw'; a.style.top=(16+Math.random()*74)+'vh'; };
  const ring=()=>{ const r=document.createElement('div'); r.className='tpring'; r.style.left=a.style.left; r.style.top=a.style.top;
    document.body.appendChild(r); setTimeout(()=>r.remove(),700); };
  place();
  const loop=()=>{
    a.classList.remove('in'); a.classList.add('out');            // teleport out
    setTimeout(()=>{ place(); a.classList.remove('out'); a.classList.add('in'); ring(); }, 500);  // blink in elsewhere
    setTimeout(loop, 2600+Math.random()*3400);
  };
  setTimeout(()=>{ a.classList.add('in'); ring(); loop(); }, Math.random()*2600);
}
for(let i=0;i<5;i++) makeAbra();

const cvs=document.getElementById('confetti'),ctx=cvs.getContext('2d');
function fit(){cvs.width=innerWidth;cvs.height=innerHeight;}fit();addEventListener('resize',fit);
let parts=[];
function burst(good){const cols=good?['#ffd23f','#5fd07a','#4fb0ff','#ff6bd6']:['#ff6b57','#ff9bbb','#ffd23f'];
  for(let i=0;i<120;i++)parts.push({x:innerWidth/2,y:innerHeight/3,vx:(Math.random()-.5)*12,vy:-Math.random()*12-3,
    c:cols[i%cols.length],r:4+Math.random()*5,a:1,rot:Math.random()*6});}
function tick(){ctx.clearRect(0,0,cvs.width,cvs.height);parts.forEach(p=>{p.vy+=.35;p.x+=p.vx;p.y+=p.vy;p.a-=.012;p.rot+=.2;
  ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=p.c;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);ctx.restore();});
  parts=parts.filter(p=>p.a>0&&p.y<innerHeight+20);requestAnimationFrame(tick);}
tick();

/* ===== boot ===== */
go('town');
</script>
