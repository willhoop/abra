name: ingest
# Continually collect new ladder games as they are played.
on:
  schedule:
    - cron: '17 * * * *'      # hourly (GitHub may delay on low-activity repos; that's fine)
  workflow_dispatch:           # allow a manual run from the Actions tab
permissions:
  contents: write              # so the job can commit the refreshed data back
concurrency:
  group: ingest
  cancel-in-progress: false
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      # A collection job must never page the owner. Showdown can rate-limit, time out, or serve a
      # malformed log; none of that is a defect in this repo, and failing the run emailed a failure
      # notice every hour. These steps report their error and the run carries on.
      - name: Pull new replays (only appends games not already stored)
        continue-on-error: true
        run: PAGES=6 CONC=20 node engine/durable-ingest.js data/games.ladder.jsonl
      - name: Rebuild the meta model
        continue-on-error: true
        run: node engine/analyze.js data/games.ladder.jsonl
      - name: Commit if the store or model changed
        run: |
          git config user.name  "abra-bot"
          git config user.email "abra-bot@users.noreply.github.com"
          git add data/games.ladder.jsonl data/meta-usage.json
          if git diff --cached --quiet; then
            echo "no new games this run"; exit 0
          fi
          git commit -m "ingest: new ladder games $(date -u +%Y-%m-%dT%H:%MZ)"
          # Manual pushes move origin between runs, so a plain push is rejected
          # (non-fast-forward) and the job fails + emails. Rebase onto origin and retry.
          # .gitattributes marks the .jsonl stores merge=union so appends never conflict.
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && exit 0
            echo "push attempt $i failed; retrying"; sleep 5
          done
          echo "::warning::ingest could not push after 3 attempts; will retry next hour"
          exit 0   # do not fail the workflow — a transient push race is not an error
